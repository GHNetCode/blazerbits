    }

    /* responsive cubes: smaller on mobile */
    @media (max-width: 600px) {
      .bit-cube { width: 32px; height: 32px; font-size: 0.9rem; }

<body>

<div class="noise-overlay"></div>
<div class="container">
  <!-- main identity: BLAZERBITS with glitchy effect -->
  <div class="blazerbits-word" data-text="BLAZERBITS">BLAZERBITS</div>

  <!-- bitstream decorative element -->
  <div class="bits-sub">
    <span>&lt; 0x42 &nbsp;|&nbsp; BLAZE // BITS &nbsp;|&nbsp; 0x4C &gt;</span>
  </div>

  <!-- dynamic grid of "bits" (cubes with binary/floating values) -->
  <div class="bit-grid" id="bitGrid"></div>

  <!-- blazing trail effect -->
  <div class="blaze-trail"></div>

  <!-- stats + binary vibe -->
  <div class="stats-badge">
    <div>🔥 BLAZE MODE: <i>ACTIVE</i></div>
    <div>⚡ 1010011 01110000 01100101 01100101 01100100</div>
    <div>🖥️ BITS: <span id="bitCounter">64</span> UNITS</div>
  </div>
</div>

<div class="glow-cursor" id="cursorGlow"></div>

<script>
  (function() {
    // --- BIT GRID GENERATION: create 24 cubes each with random binary or hex digit to represent 'bits' 
    const gridContainer = document.getElementById('bitGrid');
    const bitCounterSpan = document.getElementById('bitCounter');
    
    // number of bit cubes: between 16 and 28 depending on screen (dynamic but fixed for consistency)
    let cubeCount = 24;
    if(window.innerWidth < 500) cubeCount = 18;
    else if(window.innerWidth < 800) cubeCount = 21;
    else cubeCount = 28;
    
    const bitValues = ['0','1','B','A','Z','E','R','⚡','0x0','0x1','#','🔥','<b>','</b>','01','10','FF','A7','C3'];
    // but we want a sleek binary/hex flavor, plus some "blaze" symbols
    
    function getRandomBitSymbol() {
      const symbols = ['0','1','B','Z','R','⚡','🔥','#','0x1','0x0','1T','B1','A1','Z3'];
      return symbols[Math.floor(Math.random() * symbols.length)];
    }
    
    // generate cubes
    function buildBitGrid() {
      gridContainer.innerHTML = '';
      for(let i = 0; i < cubeCount; i++) {
        const cube = document.createElement('div');
        cube.className = 'bit-cube';
        // custom attribute for pseudo-element content
        let bitChar = getRandomBitSymbol();
        // make it extra dynamic: sometimes show hexadecimal nibble
        if(Math.random() > 0.7) bitChar = Math.floor(Math.random()*16).toString(16).toUpperCase();
        if(Math.random() > 0.85) bitChar = '⚡';
        cube.setAttribute('data-bit', bitChar);
        // individual animation delay style
        const randomDelay = (Math.random() * 1.5).toFixed(2);
        cube.style.animationDelay = `${randomDelay}s`;
        // also add hover effect: scale + change color
        cube.addEventListener('mouseenter', function(e) {
          this.style.transform = 'scale(1.2) rotate(3deg)';
          this.style.backgroundColor = 'rgba(255, 80, 40, 0.8)';
          this.style.borderColor = '#ffcc00';
          this.style.boxShadow = '0 0 20px #ff5500';
          // change text content temporarily for blazing effect
          const originalBit = this.getAttribute('data-bit');
          this.setAttribute('data-original', originalBit);
          this.setAttribute('data-bit', '🔥');
          // update pseudo content needs to re-apply attribute? pseudo uses content attr, works instantly
        });
        cube.addEventListener('mouseleave', function(e) {
          this.style.transform = 'scale(1) rotate(0deg)';
          this.style.backgroundColor = '';
          this.style.borderColor = '';
          this.style.boxShadow = '';
          const orig = this.getAttribute('data-original');
          if(orig) this.setAttribute('data-bit', orig);
          else this.setAttribute('data-bit', getRandomBitSymbol());
        });
        gridContainer.appendChild(cube);
      }
      if(bitCounterSpan) bitCounterSpan.innerText = cubeCount;
    }
    
    buildBitGrid();
    
    // refresh bits periodically to simulate "digital fire" (blazing bits)
    let intervalBits = setInterval(() => {
      const cubes = document.querySelectorAll('.bit-cube');
      cubes.forEach(cube => {
        // only change if not being hovered (avoid override while hovering)
        if(!cube.matches(':hover')) {
          let newSym = getRandomBitSymbol();
          if(Math.random() > 0.8) newSym = (Math.floor(Math.random()*16)).toString(16).toUpperCase();
          if(Math.random() > 0.9) newSym = '💥';
          cube.setAttribute('data-bit', newSym);
          // remove any leftover original data if needed
          if(cube.hasAttribute('data-original')) cube.removeAttribute('data-original');
        }
      });
    }, 1800);
    
    // Additional dynamic animation: create floating particles "bits" around the title
    function createFloatingParticle() {
      const particle = document.createElement('div');
      particle.innerHTML = Math.random() > 0.5 ? '1' : '0';
      particle.style.position = 'fixed';
      particle.style.fontFamily = 'monospace';
      particle.style.fontWeight = 'bold';
      particle.style.fontSize = Math.random() * 16 + 10 + 'px';
      particle.style.color = `hsl(${Math.random() * 40 + 20}, 100%, 65%)`;
      particle.style.pointerEvents = 'none';
      particle.style.zIndex = '1000';
      particle.style.textShadow = '0 0 5px cyan';
      particle.style.opacity = '0.8';
      const startX = Math.random() * window.innerWidth;
      const startY = window.innerHeight + 20;
      particle.style.left = startX + 'px';
      particle.style.top = startY + 'px';
      particle.style.position = 'fixed';
      document.body.appendChild(particle);
      
      let posY = startY;
      let drift = (Math.random() - 0.5) * 60;
      let xOffset = 0;
      const speed = 1.5 + Math.random() * 1.8;
      const lifetime = setInterval(() => {
        posY -= speed;
        xOffset += (drift * 0.08);
        particle.style.transform = `translateX(${xOffset}px)`;
        particle.style.top = posY + 'px';
        if(posY < -50) {
          clearInterval(lifetime);
          particle.remove();
        }
      }, 30);
      // remove after 5 seconds max safety
      setTimeout(() => {
        if(particle.parentNode) particle.remove();
      }, 6000);
    }
    
    // create floating bits occasionally for "blazer" trail effect
    let particleInterval = setInterval(() => {
      if(document.hasFocus()) createFloatingParticle();
    }, 450);
    
    // Cursor glow effect with trailing bits
    const cursor = document.getElementById('cursorGlow');
    let mouseX = 0, mouseY = 0;
    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      cursor.style.transform = `translate(${mouseX - 10}px, ${mouseY - 10}px)`;
      
      // occasionally spawn a tiny bit from cursor
      if(Math.random() < 0.08) {
        const miniBit = document.createElement('span');
        miniBit.innerText = Math.random() > 0.6 ? '1' : '0';
        miniBit.style.position = 'fixed';
        miniBit.style.left = mouseX + 'px';
        miniBit.style.top = mouseY + 'px';
        miniBit.style.fontSize = '12px';
        miniBit.style.fontWeight = 'bold';
        miniBit.style.color = '#ffaa44';
        miniBit.style.fontFamily = 'monospace';
        miniBit.style.zIndex = '9999';
        miniBit.style.pointerEvents = 'none';
        miniBit.style.textShadow = '0 0 4px orange';
        miniBit.style.opacity = '0.9';
        document.body.appendChild(miniBit);
        setTimeout(() => {
          miniBit.style.transition = 'all 0.5s ease';
          miniBit.style.opacity = '0';
          miniBit.style.transform = 'translateY(-20px)';
          setTimeout(() => miniBit.remove(), 600);
        }, 30);
      }
    });
    
    // resizing: adjust grid count (optional but better for responsive)
    window.addEventListener('resize', () => {
      let newCount = 24;
      if(window.innerWidth < 500) newCount = 18;
      else if(window.innerWidth < 800) newCount = 21;
      else newCount = 28;
      if(newCount !== cubeCount) {
        cubeCount = newCount;
        if(bitCounterSpan) bitCounterSpan.innerText = cubeCount;
        buildBitGrid();
      }
    });
    
    // Additional "blazer" effect: dynamically change blaze trail color based on time
    const trail = document.querySelector('.blaze-trail');
    let hue = 10;
    setInterval(() => {
      hue = (hue + 3) % 360;
      if(trail) {
        trail.style.background = `linear-gradient(90deg, hsl(${hue}, 100%, 55%), hsl(${hue + 40}, 100%, 60%), #ff3a7c)`;
      }
      const textElem = document.querySelector('.blazerbits-word');
      if(textElem) {
        // subtle text shadow oscillation
        textElem.style.textShadow = `0 0 ${8 + Math.sin(Date.now() / 500) * 4}px rgba(255, 100, 0, 0.7), 0 0 15px cyan`;
      }
    }, 280);
    
    // simulate digital console log in background for 'blazerbits' vibe
    console.log("%c🔥 BLAZERBITS // INITIALIZED // BINARY STREAM ACTIVE", "color: #ff8800; font-size: 16px; font-family: monospace");
    console.log("%c⚡ 64 BITS OF BLAZING FIRE ⚡", "color: #0ff; font-weight: bold");
    
    // clean intervals on page unload (just good practice)
    window.addEventListener('beforeunload', () => {
      clearInterval(intervalBits);
      clearInterval(particleInterval);
    });
    
    // add an interactive click on the main text to produce explosion of bits
    const mainTitle = document.querySelector('.blazerbits-word');
    if(mainTitle) {
      mainTitle.addEventListener('click', (e) => {
        for(let i = 0; i < 30; i++) {
          const burstBit = document.createElement('div');
          burstBit.innerText = ['0','1','🔥','B','Z','⚡','#'][Math.floor(Math.random()*7)];
          burstBit.style.position = 'fixed';
          burstBit.style.left = e.clientX + (Math.random() - 0.5) * 60 + 'px';
          burstBit.style.top = e.clientY + (Math.random() - 0.5) * 60 + 'px';
          burstBit.style.fontSize = Math.random() * 20 + 12 + 'px';
          burstBit.style.fontWeight = 'bold';
          burstBit.style.color = `hsl(${Math.random() * 60 + 20}, 100%, 60%)`;
          burstBit.style.fontFamily = 'monospace';
          burstBit.style.pointerEvents = 'none';
          burstBit.style.zIndex = '9999';
          burstBit.style.transition = 'all 0.7s ease-out';
          burstBit.style.opacity = '1';
          document.body.appendChild(burstBit);
          setTimeout(() => {
            burstBit.style.transform = `translate(${(Math.random() - 0.5)*100}px, ${(Math.random() - 0.8)*120 - 60}px)`;
            burstBit.style.opacity = '0';
            setTimeout(() => burstBit.remove(), 800);
          }, 10);
        }
      });
    }
  })();
</script>
</body>
</html>
